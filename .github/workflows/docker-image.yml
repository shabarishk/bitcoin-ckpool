name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push with Compose
        run: |
          docker compose build
          docker compose push

      - name: Verify image exists in GHCR
        run: |
          # Encode token for API access
          ENCODED_TOKEN=$(echo -n "${{ secrets.GITHUB_TOKEN }}" | base64)
          # Query the tags list for your image
          curl -s -H "Authorization: Bearer ${ENCODED_TOKEN}" \
          https://ghcr.io/v2/${{ github.repository }}/tags/list
